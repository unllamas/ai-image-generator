<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Generate, edit, and compare AI images across GPT Image, Gemini, and future image providers from one multi-model playground."
    />

      name="keywords"
      content="ai image generator, ai image playground, generate ai image, GPT image generator, Gemini image generator, multi model image generator"
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="AI Image Playground" />

    <link rel="alternate" hreflang="en" href="__SITE_URL__/" />
    <link rel="alternate" hreflang="es" href="__SITE_URL__/es/" />
    <link rel="alternate" hreflang="x-default" href="__SITE_URL__/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AI Image Playground" />
    <meta property="og:title" content="AI Image Generator Playground" />
    <meta
      property="og:description"
      content="Generate and compare images across GPT Image, Gemini, and future AI image providers in one workflow."
    />
    <meta property="og:url" content="__SITE_URL__/" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AI Image Generator Playground" />

      content="A multi-model AI image generator playground for GPT Image, Gemini, and future providers."

    <script>
      window.APP_CONFIG = {
        gaMeasurementId: '__GA_MEASUREMENT_ID__',
        siteUrl: '__SITE_URL__',
      };
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "AI Image Playground",
        "alternateName": "AI Image Generator Playground",
        "url": "__SITE_URL__/",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Web",
        "description": "Generate, edit, and compare AI images across GPT Image, Gemini, and future image providers from one multi-model playground.",
        "featureList": [
          "AI image generation",
          "Multi-model image comparison",
          "Reference image editing",
          "Aspect ratio and quality controls",
          "Local prompt and image history"
        ],
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-neutral-950 text-neutral-200 min-h-screen font-sans">
    <div class="max-w-5xl mx-auto p-4 md:p-8 space-y-6">
      <header class="flex flex-col md:flex-row md:items-center justify-between gap-3">
        <h1 class="text-xl font-semibold text-white">AI Image Generator Playground</h1>
        <div class="flex gap-2">
          <input
            id="apiKey"
            type="password"
            placeholder="Vercel AI Gateway API Key"
            class="bg-neutral-900 border border-neutral-800 rounded-lg px-3 py-2 text-sm w-72 focus:outline-none focus:border-neutral-600"
          />
          <button id="saveKey" class="bg-neutral-800 hover:bg-neutral-700 rounded-lg px-4 py-2 text-sm">Save</button>
        </div>
      </header>

      <div class="grid md:grid-cols-2 gap-6">
        <section class="bg-neutral-900 border border-neutral-800 rounded-2xl p-5 space-y-5 h-fit">
          <div>
            <input id="fileInput" type="file" accept="image/*" multiple class="hidden" />
            <div class="flex items-center gap-2 flex-wrap">
              <button
                id="uploadBtn"
                class="w-16 h-16 bg-neutral-800 hover:bg-neutral-700 rounded-xl flex flex-col items-center justify-center text-xs text-neutral-400"
              >
                <span class="text-lg">🖼️</span>
                <span id="refCount">0/5</span>
              </button>
              <div id="refPreviews" class="flex gap-2"></div>
            </div>
          </div>

          <!-- Prompt -->
          <div class="relative">
            <textarea
              id="prompt"
              rows="4"
              maxlength="5000"
              placeholder="A cyberpunk astronaut walking through neon-lit Kyoto streets in the rain..."
              class="w-full bg-neutral-950 border border-neutral-800 rounded-xl p-3 pr-20 text-sm resize-none focus:outline-none focus:border-neutral-600"
            ></textarea>
            <span id="promptCount" class="absolute top-2 right-3 text-xs text-neutral-500">0/5000</span>
          </div>

          <div class="flex items-center gap-2">
            <select id="model" class="bg-neutral-800 rounded-full px-4 py-2 text-sm focus:outline-none flex-1">
              <option value="openai/gpt-image-2">GPT Image 2</option>
              <option value="google/gemini-3.1-flash-image">Gemini 3.1 Flash Image</option>
              <option value="google/gemini-3-pro-image">Gemini 3 Pro Image</option>
            </select>
            <button
              id="advancedToggle"
              type="button"
              class="bg-neutral-800 hover:bg-neutral-700 rounded-full px-4 py-2 text-sm text-neutral-200"
            >
              Advanced options
            </button>
          </div>

          <div id="advancedPanel" class="space-y-4 text-sm hidden">
            <div class="flex items-center justify-between">
              <span class="text-neutral-400">Aspect Ratio</span>
              <div id="ratio" class="flex bg-neutral-800 rounded-full p-1" data-value="1:1">
                <button data-v="1:1" class="pill">1:1</button>
                <button data-v="9:16" class="pill">9:16</button>
                <button data-v="16:9" class="pill">16:9</button>
                <button data-v="3:2" class="pill">3:2</button>
              </div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-neutral-400">Output count</span>
              <div id="count" class="flex bg-neutral-800 rounded-full p-1" data-value="1">
                <button data-v="1" class="pill">1</button>
                <button data-v="2" class="pill">2</button>
                <button data-v="3" class="pill">3</button>
                <button data-v="4" class="pill">4</button>
              </div>
            </div>
            <div class="flex items-center justify-between gap-3">
              <span class="text-neutral-400">Quality</span>
              <select id="quality" class="bg-neutral-800 rounded-full px-3 py-2 text-sm focus:outline-none">
                <option value="medium">Medium · 2K</option>
                <option value="low">Low · 1K</option>
                <option value="high">High · 4K</option>
              </select>
            </div>
          </div>

          <button
            id="generate"
            class="w-full bg-white text-black font-medium rounded-xl py-3 hover:bg-neutral-200 disabled:opacity-40 disabled:cursor-not-allowed transition"
          >
            Generate
          </button>
          <p id="error" class="text-red-400 text-sm hidden"></p>
        </section>

        <section>
          <div id="results" class="grid grid-cols-2 gap-3"></div>
          <p id="empty" class="text-center py-20 text-neutral-600 text-sm">Generated images will appear here</p>
        </section>
      </div>
    </div>

    <div id="imageModal" class="fixed inset-0 z-50 hidden bg-black/90 p-3 md:p-6">
      <button
        id="closeModal"
        class="fixed top-4 right-4 z-10 bg-white text-black rounded-full w-10 h-10 text-xl leading-none hover:bg-neutral-200"
        aria-label="Close image"
      >
        ×
      </button>
      <div class="h-full max-w-6xl mx-auto flex items-center justify-center">
        <div
          class="w-full max-h-full overflow-y-auto md:overflow-hidden rounded-2xl border border-neutral-800 bg-neutral-950 shadow-2xl md:grid md:grid-cols-[minmax(0,1.35fr)_minmax(320px,0.65fr)]"
        >
          <div
            class="min-h-0 bg-[repeating-linear-gradient(45deg,#1e1d1d_0_1px,transparent_1px_8px)] flex items-center justify-center p-3 md:p-6"
          >
            <img
              id="modalImage"
              alt="Generated image preview"
              class="max-h-[46vh] md:max-h-[76vh] max-w-full rounded-xl border border-neutral-800 object-contain bg-neutral-900"
            />
          </div>
          <aside class="min-h-0 border-t md:border-t-0 md:border-l border-neutral-800 flex flex-col">
            <div class="min-h-0 overflow-y-auto p-4 md:p-5 space-y-5">
              <div class="space-y-2">
                <p class="text-xs uppercase text-neutral-500">Model</p>
                <p id="modalModel" class="text-sm font-medium text-white"></p>
              </div>
              <div class="space-y-2">
                <p class="text-xs uppercase text-neutral-500">Prompt</p>
                <p id="modalPrompt" class="max-h-40 overflow-y-auto text-sm leading-6 text-neutral-300"></p>
              </div>
              <dl class="grid grid-cols-2 gap-3 text-sm">
                <div>
                  <dt class="text-xs uppercase text-neutral-500">Aspect Ratio</dt>
                  <dd id="modalAspectRatio" class="mt-1 text-white"></dd>
                </div>
                <div>
                  <dt class="text-xs uppercase text-neutral-500">Quality</dt>
                  <dd id="modalQuality" class="mt-1 text-white"></dd>
                </div>
                <div>
                  <dt class="text-xs uppercase text-neutral-500">Resolution</dt>
                  <dd id="modalResolution" class="mt-1 text-white"></dd>
                </div>
                <div>
                  <dt class="text-xs uppercase text-neutral-500">Size</dt>
                  <dd id="modalSize" class="mt-1 text-white"></dd>
                </div>
              </dl>
            </div>
            <div class="border-t border-neutral-800 p-4 md:p-5 flex gap-2 justify-end">
              <a
                id="modalDownload"
                download="ai-image.webp"
                class="bg-white text-black rounded-full px-4 py-2 text-sm font-medium hover:bg-neutral-200"
              >
                Download
              </a>
              <button
                id="modalEdit"
                class="bg-neutral-800 text-white border border-neutral-700 rounded-full px-4 py-2 text-sm font-medium hover:bg-neutral-700"
              >
                Edit
              </button>
            </div>
          </aside>
        </div>
      </div>
    </div>

    <style>
      .pill {
        padding: 0.35rem 0.85rem;
        border-radius: 9999px;
        font-size: 0.8rem;
        color: #a3a3a3;
      }
      .pill.active {
        background: #fff;
        color: #000;
        font-weight: 500;
      }
    </style>

    <script>
      const refImages = [];
      const MAX_REFS = 5;
      const MAX_HISTORY = 20;
      const MAX_PROMPT_CHARS = 5000;
      const DB_NAME = 'ai_image_playground';
      const DB_STORE = 'generated_images';
      let generatedImages = [];
      let pendingGenerations = [];
      let selectedImageId = null;
      const $ = (id) => document.getElementById(id);
      const analyticsDebug = new URLSearchParams(location.search).get('analytics_debug') === '1';

      function initAnalytics() {
        const params = new URLSearchParams(location.search);
        const configuredId = window.APP_CONFIG?.gaMeasurementId;
        const measurementId =
          params.get('ga_id') || (configuredId && !configuredId.startsWith('__') ? configuredId : '');
        if (!measurementId) return;

        window.dataLayer = window.dataLayer || [];
        window.gtag = function gtag() {
          dataLayer.push(arguments);
        };
        gtag('js', new Date());
        gtag('config', measurementId, {
          anonymize_ip: true,
          send_page_view: true,
        });

        const script = document.createElement('script');
        script.async = true;
        script.src = `https://www.googletagmanager.com/gtag/js?id=${encodeURIComponent(measurementId)}`;
        document.head.appendChild(script);
      }

      function analyticsContext() {
        const quality = $('quality').value;
        return {
          model: $('model').value,
          aspect_ratio: $('ratio').dataset.value,
          quality,
          resolution: qualityToResolution(quality),
          output_count: Number($('count').dataset.value),
          reference_count: refImages.length,
          has_references: refImages.length > 0,
          advanced_open: !$('advancedPanel').classList.contains('hidden'),
        };
      }

      function trackEvent(name, params = {}) {
        const allowed = [
          'model',
          'aspect_ratio',
          'quality',
          'resolution',
          'output_count',
          'reference_count',
          'has_references',
          'advanced_open',
          'image_count',
          'warnings_count',
          'duration_ms',
          'category',
          'status',
          'action',
        ];
        const payload = {};
        for (const key of allowed) {
          if (params[key] !== undefined) payload[key] = params[key];
        }
        if (analyticsDebug) console.info('[analytics]', name, payload);
        if (typeof window.gtag === 'function') {
          window.gtag('event', name, payload);
        }
      }

      $('apiKey').value = localStorage.getItem('ai_gw_key') || '';
      $('saveKey').onclick = () => {
        localStorage.setItem('ai_gw_key', $('apiKey').value.trim());
        trackEvent('api_key_saved');
        $('saveKey').textContent = 'Saved';
        setTimeout(() => ($('saveKey').textContent = 'Save'), 1500);
      };

      $('advancedToggle').onclick = () => {
        $('advancedPanel').classList.toggle('hidden');
        trackEvent('advanced_options_toggle', {
          ...analyticsContext(),
          action: $('advancedPanel').classList.contains('hidden') ? 'close' : 'open',
        });
      };

      $('prompt').addEventListener('input', () => {
        const count = $('prompt').value.length;
        $('promptCount').textContent = `${count}/${MAX_PROMPT_CHARS}`;
        $('promptCount').classList.toggle('text-red-400', count >= MAX_PROMPT_CHARS);
        $('promptCount').classList.toggle('text-neutral-500', count < MAX_PROMPT_CHARS);
      });

      document.querySelectorAll('#ratio, #count').forEach((group) => {
        const sync = () =>
          group
            .querySelectorAll('.pill')
            .forEach((b) => b.classList.toggle('active', b.dataset.v === group.dataset.value));
        group.addEventListener('click', (e) => {
          if (!e.target.dataset.v) return;
          group.dataset.value = e.target.dataset.v;
          sync();
          trackEvent('generation_option_changed', analyticsContext());
        });
        sync();
      });

      $('model').addEventListener('change', () => {
        trackEvent('model_changed', analyticsContext());
      });
      $('quality').addEventListener('change', () => {
        trackEvent('generation_option_changed', analyticsContext());
      });

      $('uploadBtn').onclick = () => $('fileInput').click();
      $('fileInput').onchange = (e) => {
        [...e.target.files].forEach((file) => {
          if (refImages.length >= MAX_REFS) return;
          const reader = new FileReader();
          reader.onload = () => addRefImage(reader.result);
          reader.readAsDataURL(file);
        });
        e.target.value = '';
      };

      function addRefImage(src) {
        if (refImages.length >= MAX_REFS) {
          showError(`You can use up to ${MAX_REFS} reference images.`);
          return false;
        }
        refImages.push(src);
        renderRefs();
        trackEvent('reference_image_added', analyticsContext());
        return true;
      }

      function renderRefs() {
        $('refCount').textContent = `${refImages.length}/${MAX_REFS}`;
        $('refPreviews').innerHTML = refImages
          .map(
            (src, i) => `
        <div class="relative w-16 h-16">
          <img src="${escapeAttr(src)}" class="w-16 h-16 object-cover rounded-xl border border-neutral-700"/>
          <button onclick="removeRef(${i})"
            class="absolute -top-1.5 -right-1.5 bg-red-500 text-white rounded-full w-5 h-5 text-xs leading-none">×</button>
        </div>`,
          )
          .join('');
      }
      window.removeRef = (i) => {
        refImages.splice(i, 1);
        renderRefs();
        trackEvent('reference_image_removed', analyticsContext());
      };

      function computeSize(ratio, res) {
        const base = { '1K': 1024, '2K': 2048, '4K': 4096 }[res];
        const [w, h] = ratio.split(':').map(Number);
        const round64 = (n) => Math.round(n / 64) * 64;
        return w >= h ? `${round64((base * w) / h)}x${base}` : `${base}x${round64((base * h) / w)}`;
      }

      function qualityToResolution(quality) {
        return { low: '1K', medium: '2K', high: '4K' }[quality] || '2K';
      }

      function openHistoryDb() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, 1);
          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(DB_STORE)) {
              db.createObjectStore(DB_STORE, { keyPath: 'id' });
            }
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      async function loadHistory() {
        try {
          const db = await openHistoryDb();
          const tx = db.transaction(DB_STORE, 'readonly');
          const request = tx.objectStore(DB_STORE).getAll();
          generatedImages = await new Promise((resolve, reject) => {
            request.onsuccess = () => resolve(request.result || []);
            request.onerror = () => reject(request.error);
          });
          generatedImages.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
          generatedImages = generatedImages.slice(0, MAX_HISTORY);
        } catch {
          generatedImages = [];
        }
        renderResults();
      }

      async function persistHistory() {
        try {
          const db = await openHistoryDb();
          const tx = db.transaction(DB_STORE, 'readwrite');
          const store = tx.objectStore(DB_STORE);
          const keep = new Set(generatedImages.slice(0, MAX_HISTORY).map((item) => item.id));
          const keysRequest = store.getAllKeys();
          const existing = await new Promise((resolve, reject) => {
            keysRequest.onsuccess = () => resolve(keysRequest.result || []);
            keysRequest.onerror = () => reject(keysRequest.error);
          });
          existing.forEach((id) => {
            if (!keep.has(id)) store.delete(id);
          });
          generatedImages.slice(0, MAX_HISTORY).forEach((item) => store.put(item));
        } catch {
          // In-memory history still works if IndexedDB fails.
        }
      }

      function renderResults() {
        $('empty').classList.toggle('hidden', generatedImages.length > 0 || pendingGenerations.length > 0);
        const pendingHtml = pendingGenerations
          .map(
            () => `
        <div class="col-span-2 min-h-72 rounded-xl border border-neutral-800 bg-neutral-900/80 overflow-hidden relative">
          <div class="absolute inset-0 bg-gradient-to-r from-neutral-900 via-neutral-800 to-neutral-900 animate-pulse"></div>
          <div class="absolute inset-0 flex items-center justify-center text-neutral-400 text-sm">
            Generating image...
          </div>
        </div>`,
          )
          .join('');
        const imagesHtml = generatedImages
          .map(
            (item) => `
        <div class="relative group">
          <button type="button" data-open-image="${escapeAttr(item.id)}"
            class="block w-full text-left focus:outline-none focus:ring-2 focus:ring-white/40 rounded-xl">
            <img src="${escapeAttr(item.src)}" class="rounded-xl border border-neutral-800 w-full bg-neutral-900"/>
          </button>
          <span class="pointer-events-none absolute top-2 left-2 max-w-[calc(100%-1rem)] truncate rounded-full bg-black/75 border border-white/10 px-2.5 py-1 text-[11px] font-medium text-white shadow">
            ${escapeHtml(modelLabel(item.model))}
          </span>
          <div class="absolute bottom-2 right-2 flex gap-2 opacity-0 group-hover:opacity-100 transition">
            <button type="button" data-edit-image="${escapeAttr(item.id)}"
              class="bg-black/70 px-3 py-1 rounded-lg text-xs">
              Edit
            </button>
            <a href="${escapeAttr(item.src)}" download="${downloadName(item)}"
              data-download-image="${escapeAttr(item.id)}"
              class="bg-black/70 px-3 py-1 rounded-lg text-xs">
              Download
            </a>
          </div>
        </div>`,
          )
          .join('');
        $('results').innerHTML = pendingHtml + imagesHtml;
      }

      function addGeneratedImages(images, meta) {
        const createdAt = Date.now();
        const items = images.map((src, index) => ({
          id: `${createdAt}-${index}-${Math.random().toString(36).slice(2)}`,
          src,
          prompt: meta.prompt,
          model: meta.model,
          aspectRatio: meta.aspectRatio,
          quality: meta.quality,
          resolution: meta.resolution,
          size: meta.size,
          createdAt,
        }));
        generatedImages = [...items, ...generatedImages].slice(0, MAX_HISTORY);
        persistHistory();
        renderResults();
      }

      function addPending(count) {
        const createdAt = Date.now();
        pendingGenerations = Array.from({ length: Math.max(1, count) }, (_, index) => ({
          id: `pending-${createdAt}-${index}`,
        }));
        renderResults();
      }

      function clearPending() {
        pendingGenerations = [];
        renderResults();
      }

      function downloadName(item) {
        const stamp = new Date(item.createdAt || Date.now()).toISOString().slice(0, 19).replace(/[:T]/g, '-');
        return `ai-image-${stamp}.webp`;
      }

      function escapeAttr(value) {
        return String(value).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function escapeHtml(value) {
        return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function modelLabel(model) {
        return (
          {
            'openai/gpt-image-2': 'GPT Image 2',
            'google/gemini-3.1-flash-image': 'Gemini 3.1 Flash',
            'google/gemini-3-pro-image': 'Gemini 3 Pro',
          }[model] ||
          model ||
          'Unknown model'
        );
      }

      function qualityLabel(quality) {
        return { low: 'Low', medium: 'Medium', high: 'High' }[quality] || quality || 'Not available';
      }

      function collectOptions() {
        const quality = $('quality').value;
        return {
          openai: {
            outputFormat: 'webp',
            quality,
          },
        };
      }

      $('generate').onclick = async () => {
        const apiKey = localStorage.getItem('ai_gw_key') || $('apiKey').value.trim();
        const prompt = $('prompt').value.trim();
        const errEl = $('error');
        errEl.classList.add('hidden');

        if (!apiKey) return showError('Enter your API key to generate images.');
        if (!prompt) return showError('Write a prompt.');
        if (prompt.length > MAX_PROMPT_CHARS) {
          return showError(`The prompt cannot exceed ${MAX_PROMPT_CHARS} characters.`);
        }

        $('generate').disabled = true;
        $('empty').classList.add('hidden');

        try {
          const model = $('model').value;
          const requestedCount = Number($('count').dataset.value);
          const aspectRatio = $('ratio').dataset.value;
          const quality = $('quality').value;
          const resolution = qualityToResolution(quality);
          const size = computeSize(aspectRatio, resolution);
          const startedAt = performance.now();
          addPending(requestedCount);
          trackEvent('generate_start', analyticsContext());
          const r = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              apiKey,
              model,
              prompt,
              size,
              aspectRatio,
              n: Number($('count').dataset.value),
              images: refImages,
              options: collectOptions(),
            }),
          });
          const data = await r.json();
          if (!r.ok) throw data.error || new Error('Unknown error');
          addGeneratedImages(data.images || [], { prompt, model, aspectRatio, quality, resolution, size });
          trackEvent('generate_success', {
            ...analyticsContext(),
            image_count: (data.images || []).length,
            warnings_count: (data.warnings || []).length,
            duration_ms: Math.round(performance.now() - startedAt),
          });
        } catch (err) {
          showError(formatError(err));
          trackEvent('generate_error', {
            ...analyticsContext(),
            category: err?.category || 'unknown',
            status: err?.status || 0,
          });
          $('empty').classList.toggle('hidden', generatedImages.length > 0 || pendingGenerations.length > 0);
        } finally {
          clearPending();
          $('generate').disabled = false;
        }
      };

      function showError(msg) {
        const el = $('error');
        el.textContent = msg;
        el.classList.remove('hidden');
      }

      function formatError(err) {
        if (typeof err === 'string') return err;
        const message = err?.message || 'Unknown error';
        const parts = [message];
        if (err?.category === 'safety') {
          if (err?.requestId) parts.push(`ID: ${err.requestId}`);
          if (Array.isArray(err?.violations) && err.violations.length) {
            parts.push(`Reason: ${err.violations.join(', ')}`);
          }
          return parts.join(' ');
        }
        if (err?.requestId) parts.push(`ID: ${err.requestId}`);
        if (err?.raw && err.raw !== message) parts.push(`Details: ${err.raw}`);
        return parts.join(' ');
      }

      $('results').addEventListener('click', (e) => {
        const editor = e.target.closest('[data-edit-image]');
        if (editor) {
          editImage(editor.dataset.editImage);
          return;
        }
        const downloader = e.target.closest('[data-download-image]');
        if (downloader) {
          trackEvent('image_downloaded', analyticsContext());
          return;
        }
        const opener = e.target.closest('[data-open-image]');
        if (!opener) return;
        openModal(opener.dataset.openImage);
      });

      function openModal(id) {
        const item = generatedImages.find((img) => img.id === id);
        if (!item) return;
        selectedImageId = id;
        $('modalImage').src = item.src;
        $('modalDownload').href = item.src;
        $('modalDownload').download = downloadName(item);
        $('modalModel').textContent = modelLabel(item.model);
        $('modalPrompt').textContent = item.prompt || 'Not available';
        $('modalAspectRatio').textContent = item.aspectRatio || 'Not available';
        $('modalQuality').textContent = qualityLabel(item.quality);
        $('modalResolution').textContent = item.resolution || 'Not available';
        $('modalSize').textContent = item.size || 'Not available';
        $('imageModal').classList.remove('hidden');
        document.body.classList.add('overflow-hidden');
        trackEvent('image_modal_opened', analyticsContext());
      }

      function closeModal() {
        selectedImageId = null;
        $('imageModal').classList.add('hidden');
        $('modalImage').removeAttribute('src');
        $('modalDownload').removeAttribute('href');
        document.body.classList.remove('overflow-hidden');
      }

      $('closeModal').onclick = closeModal;
      $('imageModal').addEventListener('click', (e) => {
        if (e.target === $('imageModal')) closeModal();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !$('imageModal').classList.contains('hidden')) closeModal();
      });
      function editImage(id) {
        const item = generatedImages.find((img) => img.id === id);
        if (!item) return;
        if (addRefImage(item.src)) {
          closeModal();
          $('prompt').focus();
          trackEvent('image_edit_started', analyticsContext());
        }
      }
      $('modalEdit').onclick = () => editImage(selectedImageId);
      $('modalDownload').onclick = () => trackEvent('image_downloaded', analyticsContext());

      initAnalytics();
      loadHistory();
      $('prompt').dispatchEvent(new Event('input'));
    </script>
  </body>
</html>
